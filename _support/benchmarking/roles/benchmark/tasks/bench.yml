---
- name: Create benchmark results directory on Gitaly node
  file:
    path: "/tmp/{{ run_name }}"
    state: directory
    mode: "0755"
    owner: git
    group: git

- name: Create benchmark results directory on client node
  file:
    path: "/tmp/{{ run_name }}"
    state: directory
    mode: "0755"
    owner: git
    group: git
  delegate_to: "{{ groups['client'][0] }}"

# Clear the page cache so all runs start with a cold cache
- name: Clear kernel page cache
  shell: sync && echo 3 > /proc/sys/vm/drop_caches
  when: clear_page_cache | bool

# Create new Gitaly process for each run for easy log collection
- name: Start Gitaly service
  systemd:
    name: gitaly
    state: started
  notify: stop gitaly

- name: Pause for Gitaly to start up
  pause:
    seconds: 5

# We run this task as async and poll 0 to make it non-blocking.
# It will be allowed to run up to `workload_wait_duration` before
# being treated as failed.
- name: Run Go workload generator
  command:
    argv:
      - /usr/local/go/bin/go
      - run
      - main.go
      - "{{ hostvars[groups['gitaly'][0]]['internal'] }}"
      - "{{ run_name }}"
      - testdata/workload.yaml
    chdir: /opt/benchmark-gitaly
  async: "{{ workload_wait_duration }}"
  poll: 0
  register: workload_wait
  delegate_to: "{{ groups['client'][0] }}"

- name: Profile system with perf and libbpf-tools
  command:
    argv:
      - /usr/local/bin/profile-gitaly
      - "-d{{ profile_duration }}"
      - "-o/tmp/{{ run_name }}"
      - "-rbenchmark"
      - "-gbenchmark"
  when: profile | bool

- name: Wait for workload generator to exit
  async_status:
    jid: "{{ workload_wait.ansible_job_id }}"
  register: workload_result
  until: workload_result.finished
  retries: 100
  delay: 10
  delegate_to: "{{ groups['client'][0] }}"

- name: Copy workload data to Gitaly node
  synchronize:
    src: "/tmp/{{ run_name }}/"
    dest: "/tmp/{{ run_name }}/"
    private_key: /root/.ssh/id_ed25519
    set_remote_user: false
    recursive: true
  delegate_to: "{{ groups['client'][0] }}"

- name: Capture Gitaly logs
  shell: journalctl --output=cat _PID=$(pidof -s gitaly) > "/tmp/{{ run_name }}/gitaly.log"
