---
- name: Set target variables for current iteration
  set_fact:
    target_host: "{{ current_gitaly }}"
    target_name: "{{ hostvars[current_gitaly]['gitaly_name'] }}"
    target_internal_ip: "{{ hostvars[current_gitaly]['internal'] }}"

- name: Create benchmark results directory on Gitaly node
  file:
    path: "/tmp/{{ run_name }}"
    state: directory
    mode: "0755"
    owner: git
    group: git
  delegate_to: "{{ target_host }}"

- name: Create benchmark results directory on client node
  file:
    path: "/tmp/{{ run_name }}"
    state: directory
    mode: "0755"
    owner: git
    group: git

# Clear the page cache so all runs start with a cold cache
- name: Clear kernel page cache
  shell: sync && echo 3 > /proc/sys/vm/drop_caches
  when: clear_page_cache | bool
  delegate_to: "{{ target_host }}"

# Create new Gitaly process for each run for easy log collection
- name: Start Gitaly service
  systemd:
    name: gitaly
    state: restarted
  delegate_to: "{{ target_host }}"

- name: Pause for Gitaly to start up
  pause:
    seconds: 5

- name: Create benchmark-gitaly directory
  file:
    path: /opt/benchmark-gitaly
    state: directory
    mode: '0700'
    owner: git
    group: git

- name: Copy workload configuration to client node
  copy:
    src: "{{ playbook_dir }}/k6-benchmark.js"
    dest: /opt/benchmark-gitaly/k6-benchmark.js
    mode: "0644"
    owner: git
    group: git

# We run this task as async and poll 0 to make it non-blocking.
# It will be allowed to run up to `workload_wait_duration` before
# being treated as failed.
- name: Run k6
  command:
    argv:
      - k6
      - run
      - --verbose
      - k6-benchmark.js
      - --summary-mode
      - full
      - --summary-export
      - /tmp/{{ run_name }}/k6-summary-{{ target_name }}.json
      - --console-output
      - /tmp/{{ run_name }}/k6-console-logs-{{ target_name }}.txt
    chdir: /opt/benchmark-gitaly
  environment:
    GITALY_ADDRESS: "{{ target_internal_ip }}:8075"
    GITALY_PROTO_DIR: "/src/gitaly/proto"
    RUN_NAME: "{{ run_name }}"
  async: "{{ workload_wait_duration }}"
  poll: 0
  register: workload_wait

- name: Profile system with perf and libbpf-tools
  command:
    argv:
      - /usr/local/bin/profile-gitaly
      - "-d{{ profile_duration }}"
      - "-o/tmp/{{ run_name }}"
      - "-rbenchmark"
      - "-gbenchmark"
  when: profile | bool
  delegate_to: "{{ target_host }}"

- name: Wait for workload generator to exit
  async_status:
    jid: "{{ workload_wait.ansible_job_id }}"
  register: workload_result
  until: workload_result.finished
  retries: 100
  delay: 10

- name: Capture Gitaly logs
  shell: journalctl --output=cat _PID=$(pidof -s gitaly) > "/tmp/{{ run_name }}/gitaly.log"
  delegate_to: "{{ target_host }}"

- name: Copy Gitaly logs and profiles
  synchronize:
    src: "{{ target_host }}:/tmp/{{ run_name }}/"
    dest: "/tmp/{{ run_name }}/{{ target_name }}/"
    mode: pull
    private_key: /root/.ssh/id_ed25519
    set_remote_user: false
    recursive: true
  delegate_to: "{{ groups['client'][0] }}" # required to copy between two remote hosts


