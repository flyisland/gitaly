---
- name: GCloud login
  block:
    - name: GCloud login status
      command: gcloud auth print-access-token
      changed_when: false
      no_log: true
  rescue:
    - name: GCloud login
      command: gcloud auth application-default login
      no_log: true

- name: terraform.tfvars
  template:
    src: terraform.tfvars.j2
    dest: "{{ playbook_dir }}/terraform/terraform.tfvars"

- name: terraform apply
  terraform:
    project_path: "{{ playbook_dir }}/terraform"
    variables_file: terraform.tfvars
    force_init: true
    workspace: "{{ gitaly_benchmarking_experiment_name }}"
  register: tfstate
  notify:
    - add hostkeys

- name: hosts.ini
  template:
    src: hosts.ini.j2
    dest: "{{ playbook_dir }}/experiments/{{ gitaly_benchmarking_experiment_name }}/hosts.ini"
