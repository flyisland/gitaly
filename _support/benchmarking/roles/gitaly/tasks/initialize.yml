---
- name: Install client SSH pubkey
  authorized_key:
    user: root
    key: "{{ hostvars[groups['client'][0]]['client_ssh_key'] | b64decode }}"

# needed for Ansible > 4.0 https://github.com/ansible/ansible/issues/74830
- name: Install acl
  apt:
    name:
      - acl
    state: present

- name: Install filesystem tools
  apt:
    name:
      - "{{ {'xfs': 'xfsprogs', 'btrfs': 'btrfs-progs', 'ext4': 'e2fsprogs'}[target_instance.filesystem | default('ext4')] }}"
    state: present
    update_cache: yes

# Set high uid to ensure it's not squashed by another service
- name: Create 'git' user
  user:
    name: git
    uid: 1999
    groups: admin,google-sudoers
    append: true

- name: Format repositories disk
  filesystem:
    fstype: "{{ target_instance.filesystem | default('ext4') }}"
    dev: /dev/disk/by-id/google-repository-disk
    opts: "{{ target_instance.fs_format_opts | default(omit) }}"

- name: Create mount point directory
  file:
    path: /mnt/git-repositories
    state: directory
    mode: '0755'

- name: Mount repositories disk
  mount:
    path: /mnt/git-repositories
    src: /dev/disk/by-id/google-repository-disk
    fstype: "{{ target_instance.filesystem | default('ext4') }}"
    opts: "{{ target_instance.fs_mount_opts | default('discard,defaults') }}"
    state: mounted

- name: Set permissions on repositories directory
  file:
    path: /mnt/git-repositories
    owner: git
    group: git
    mode: '0755'
    state: directory

- name: Add Git PPA repository
  apt_repository:
    repo: ppa:git-core/ppa
    state: present
    update_cache: yes
  become: true

- name: Install Git
  apt:
    name: git
    state: latest
  become: true

- name: Clone repositories in parallel
  shell: |
    if [ ! -d "{{ item.name }}" ]; then
      git clone --bare --ref-format={{ item.reference_backend }} {{ item.remote }} {{ item.name }}
    fi
  args:
    chdir: /mnt/git-repositories
    creates: "/mnt/git-repositories/{{ item.name }}"
  loop: "{{ config.repositories }}"
  async: 900
  poll: 30
  register: git_clone_jobs

- name: Set git as owner of repositories directory
  file:
    path: /mnt/git-repositories
    owner: git
    group: git
    state: directory
    recurse: yes

- name: Create /src directory
  file:
    path: /src
    state: directory
    mode: '0755'
    owner: git
    group: git

# Match limits set by Omnibus
- name: Set file-max
  shell: echo "1000000" > /proc/sys/fs/file-max

- name: Update apt cache
  apt: update_cache=yes
